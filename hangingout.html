    <!-- 英雄区域 -->

            <div class="flex justify-center">
                <button id="oneClickGenerate" class="bg-accent hover:bg-orange-500 text-white font-bold py-3 px-8 rounded-full transition-colors shadow-lg">
                    一键生成路线
                </button>
            </div>
        </div>
    </section>

    <!-- 筛选区域 -->
    <section id="filter" class="py-12 bg-white">
        <div class="container mx-auto px-4">
            <h3 class="text-2xl font-bold mb-6 text-center text-gray-800">个性化筛选</h3>
            <div class="max-w-3xl mx-auto space-y-6">
                <!-- 费用筛选 -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">费用筛选</label>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center">
                            <input type="radio" name="cost" value="free" class="mr-2" checked>
                            <span>免费</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="cost" value="low" class="mr-2">
                            <span>低消（≤50元）</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="cost" value="unlimited" class="mr-2">
                            <span>不限</span>
                        </label>
                    </div>
                </div>

                <!-- 评价筛选 -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">评价筛选</label>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center">
                            <input type="radio" name="rating" value="4.0" class="mr-2" checked>
                            <span>4.0分及以上</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="rating" value="4.5" class="mr-2">
                            <span>4.5分及以上</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="rating" value="unlimited" class="mr-2">
                            <span>不限</span>
                        </label>
                    </div>
                </div>

                <!-- 场景筛选 -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">场景筛选</label>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center">
                            <input type="radio" name="scene" value="outdoor" class="mr-2" checked>
                            <span>户外（公园/广场/自然景区）</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="scene" value="indoor" class="mr-2">
                            <span>室内（绘本馆/科技馆/亲子乐园）</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="scene" value="unlimited" class="mr-2">
                            <span>不限</span>
                        </label>
                    </div>
                </div>

                <!-- 孩子年龄 -->
                <div>
                    <label for="age" class="block text-gray-700 font-medium mb-2">孩子年龄</label>
                    <select id="age" name="age" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">

                        <option value="3-6" selected>3-6岁</option>
                        <option value="6-12">6-12岁</option>
                        <option value="all">不限</option>
                    </select>
                </div>

                <!-- 提交按钮 -->
                <div class="text-center">
                    <button id="generateRoute" class="bg-primary hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition-colors shadow-lg">

        // 本地存储管理
        const storage = {
            // 获取已查看的路线
            getViewedRoutes: function() {
                const viewed = localStorage.getItem('viewedRoutes');
                return viewed ? JSON.parse(viewed) : [];
            },
            
            // 添加已查看的路线
            addViewedRoute: function(routeId) {
                const viewed = this.getViewedRoutes();
                if (!viewed.includes(routeId)) {
                    viewed.push(routeId);
                    // 只保留最近30天的记录
                    if (viewed.length > 30) {
                        viewed.shift();
                    }
                    localStorage.setItem('viewedRoutes', JSON.stringify(viewed));
                }
            },
            
            // 获取收藏的路线
            getFavorites: function() {
                const favorites = localStorage.getItem('favorites');
                return favorites ? JSON.parse(favorites) : [];
            },
            
            // 添加收藏的路线
            addFavorite: function(routeId) {
                const favorites = this.getFavorites();
                if (!favorites.includes(routeId)) {
                    favorites.push(routeId);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                }
            },
            
            // 移除收藏的路线
            removeFavorite: function(routeId) {
                const favorites = this.getFavorites();
                const index = favorites.indexOf(routeId);
                if (index > -1) {
                    favorites.splice(index, 1);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                }
            },
            
            // 获取历史记录
            getHistory: function() {
                const history = localStorage.getItem('history');
                return history ? JSON.parse(history) : [];
            },

            addHistory: function(route) {
                const history = this.getHistory();
                history.unshift(route);
                // 只保留最近20条记录
                if (history.length > 20) {
                    history.pop();
                }
                localStorage.setItem('history', JSON.stringify(history));
            }
        };

        // 获取当前季节
        function getCurrentSeason() {
            const month = new Date().getMonth() + 1;
            if (month >= 3 && month <= 5) return 'spring';
            if (month >= 6 && month <= 8) return 'summer';
            if (month >= 9 && month <= 11) return 'autumn';
            return 'winter';
        }

        // 获取当前天气（模拟数据，实际项目中应调用天气API）
        function getCurrentWeather() {
            // 模拟天气数据
            const weathers = ['sunny', 'cloudy', 'rainy'];
            return weathers[Math.floor(Math.random() * weathers.length)];
        }

        // 获取当前是工作日还是周末
        function getCurrentDayType() {
            const day = new Date().getDay();
            return day === 0 || day === 6 ? 'weekend' : 'weekday';
        }

        // 获取当前时段
        function getCurrentTimeSlot() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 12) return 'morning';
            if (hour >= 12 && hour < 18) return 'afternoon';
            return 'evening';
        }

        // 智能过滤地点
        function filterLocations() {
            // 获取筛选条件
            const cost = document.querySelector('input[name="cost"]:checked').value;
            const rating = document.querySelector('input[name="rating"]:checked').value;
            const scene = document.querySelector('input[name="scene"]:checked').value;
            const age = document.getElementById('age').value;
            
            // 获取智能适配参数
            const season = getCurrentSeason();
            const weather = getCurrentWeather();
            const dayType = getCurrentDayType();
            const timeSlot = getCurrentTimeSlot();
            
            // 获取已查看的路线
            const viewedRoutes = storage.getViewedRoutes();
            
            // 过滤地点
            const filtered = locations.filter(location => {
                // 排除已查看的路线
                if (viewedRoutes.includes(location.id)) {
                    return false;
                }
                
                // 费用过滤
                let costMatch = false;
                if (cost === 'free') {
                    costMatch = location.cost === 'free';
                } else if (cost === 'low') {
                    costMatch = location.cost === 'free' || location.price <= 50;
                } else {
                    costMatch = true;
                }
                
                // 评价过滤
                let ratingMatch = false;
                if (rating === '4.0') {
                    ratingMatch = location.rating >= 4.0;
                } else if (rating === '4.5') {
                    ratingMatch = location.rating >= 4.5;
                } else {
                    ratingMatch = true;
                }
                
                // 场景过滤
                const sceneMatch = scene === 'unlimited' || location.scene === scene;
                
                // 年龄过滤
                const ageMatch = location.age.includes(age) || location.age.includes('all');
                
                // 季节适配
                const seasonMatch = location.season.includes(season);
                
                // 天气适配
                const weatherMatch = location.weather.includes(weather);
                
                // 人流适配
                let crowdMatch = true;
                if (dayType === 'weekend' && timeSlot === 'afternoon') {
                    // 周末下午避开高人流地点
                    crowdMatch = location.crowd !== 'high';
                }
                
                return costMatch && ratingMatch && sceneMatch && ageMatch && seasonMatch && weatherMatch && crowdMatch;
            });
            
            return filtered;
        }

        // 生成路线
        function generateRoute() {
            const filteredLocations = filterLocations();
            
            if (filteredLocations.length === 0) {
                // 如果没有符合条件的地点，显示提示
                document.getElementById('routeResult').innerHTML = `
                    <div class="p-6 text-center">
                        <i class="fa fa-info-circle text-4xl text-gray-400 mb-4"></i>
                        <h4 class="text-xl font-bold text-gray-800 mb-2">暂无符合条件的路线</h4>
                        <p class="text-gray-600 mb-4">请尝试调整筛选条件，或稍后再试</p>
                        <button onclick="generateRoute()" class="bg-primary hover:bg-green-600 text-white font-medium py-2 px-4 rounded transition-colors">
                            重新生成
                        </button>
                    </div>
                `;
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            // 随机选择一个地点作为最优路线
            const randomIndex = Math.floor(Math.random() * filteredLocations.length);
            const selectedRoute = filteredLocations[randomIndex];
            
            // 选择一个备选方案
            let alternativeRoute = null;
            if (filteredLocations.length > 1) {
                let altIndex = Math.floor(Math.random() * filteredLocations.length);
                while (altIndex === randomIndex) {
                    altIndex = Math.floor(Math.random() * filteredLocations.length);
                }
                alternativeRoute = filteredLocations[altIndex];
            }
            
            // 保存到已查看记录
            storage.addViewedRoute(selectedRoute.id);
            
            // 保存到历史记录
            storage.addHistory(selectedRoute);
            
            // 显示路线结果
            displayRoute(selectedRoute, alternativeRoute);
            
            // 更新历史记录和收藏列表
            updateHistoryList();
            updateFavoritesList();
        }

        // 显示路线结果
        function displayRoute(route, alternative) {
            const routeResult = document.getElementById('routeResult');
            
            routeResult.innerHTML = `
                <div class="relative">
                    <img src="${route.image}" alt="${route.name}" class="w-full h-64 object-cover">
                    <div class="absolute top-4 right-4 flex space-x-2">
                        <button onclick="toggleFavorite(${route.id})" class="bg-white rounded-full p-2 shadow-md hover:bg-gray-100 transition-colors">
                            <i class="fa ${storage.getFavorites().includes(route.id) ? 'fa-heart text-red-500' : 'fa-heart-o text-gray-600'}"></i>
                        </button>
                        <button onclick="regenerateRoute()" class="bg-white rounded-full p-2 shadow-md hover:bg-gray-100 transition-colors">
                            <i class="fa fa-refresh text-gray-600"></i>
                        </button>
                    </div>
                </div>
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <h4 class="text-2xl font-bold text-gray-800">${route.name}</h4>
                        <span class="bg-${route.cost === 'free' ? 'green' : route.cost === 'low' ? 'blue' : 'orange'}-100 text-${route.cost === 'free' ? 'green' : route.cost === 'low' ? 'blue' : 'orange'}-800 text-xs font-medium px-2.5 py-0.5 rounded">
                            ${route.cost === 'free' ? '免费' : route.cost === 'low' ? '低消' : '付费'}
                        </span>
                    </div>
                    <div class="flex items-center mb-3">
                        <i class="fa fa-map-marker text-red-500 mr-2"></i>
                        <p class="text-gray-600">${route.address}</p>
                    </div>
                    <div class="flex items-center mb-3">
                        <i class="fa fa-clock-o text-gray-500 mr-2"></i>
                        <p class="text-gray-600">推荐游玩时长：${route.duration}</p>
                    </div>
                    <div class="flex items-center mb-4">
                        <i class="fa fa-star text-yellow-400 mr-2"></i>
                        <p class="text-gray-600">评分：${route.rating}</p>
                    </div>
                    <div class="mb-4">
                        <h5 class="font-medium text-gray-800 mb-2">核心亮点：</h5>
                        <div class="flex flex-wrap gap-2">
                            ${route.highlights.map(highlight => `
                                <span class="bg-gray-100 text-gray-800 text-xs font-medium px-2.5 py-0.5 rounded">
                                    ${highlight}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                    <p class="text-gray-600 mb-6">${route.description}</p>
                    ${route.parking ? `<p class="text-green-600 mb-6"><i class="fa fa-check-circle mr-2"></i> 有免费停车</p>` : `<p class="text-red-600 mb-6"><i class="fa fa-times-circle mr-2"></i> 无免费停车</p>`}
                    ${alternative ? `
                        <div class="border-t border-gray-200 pt-4">
                            <h5 class="font-medium text-gray-800 mb-3">备选方案：</h5>
                            <div class="flex items-center">
                                <img src="${alternative.image}" alt="${alternative.name}" class="w-20 h-20 object-cover rounded-md mr-4">
                                <div>
                                    <h6 class="font-medium text-gray-800">${alternative.name}</h6>
                                    <p class="text-sm text-gray-600">${alternative.address}</p>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                    <div class="mt-6 flex space-x-4">
                        <button onclick="regenerateRoute()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded transition-colors">
                            重新生成
                        </button>
                        <button onclick="markUnsatisfactory()" class="flex-1 bg-red-100 hover:bg-red-200 text-red-800 font-medium py-2 px-4 rounded transition-colors">
                            路线不满意
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        // 重新生成路线
        function regenerateRoute() {
            generateRoute();
        }

        // 标记路线不满意
        function markUnsatisfactory() {
            // 这里可以添加反馈逻辑，例如记录不满意的原因
            alert('感谢您的反馈，我们会改进推荐算法！');
            regenerateRoute();
        }

        // 切换收藏状态
        function toggleFavorite(routeId) {
            const favorites = storage.getFavorites();
            if (favorites.includes(routeId)) {
                storage.removeFavorite(routeId);
            } else {
                storage.addFavorite(routeId);
            }
            // 更新当前路线的收藏状态
            const favoriteBtn = document.querySelector(`button[onclick="toggleFavorite(${routeId})"] i`);
            if (favoriteBtn) {
                if (storage.getFavorites().includes(routeId)) {
                    favoriteBtn.className = 'fa fa-heart text-red-500';
                } else {
                    favoriteBtn.className = 'fa fa-heart-o text-gray-600';
                }
            }
            // 更新收藏列表
            updateFavoritesList();
        }

        // 更新历史记录列表
        function updateHistoryList() {
            const history = storage.getHistory();
            const historyList = document.getElementById('historyList');
            
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-center text-gray-500">暂无历史记录</p>';
                return;
            }
            
            historyList.innerHTML = history.map(route => `
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="flex">
                        <img src="${route.image}" alt="${route.name}" class="w-32 h-32 object-cover">
                        <div class="flex-1 p-4">
                            <h4 class="font-bold text-gray-800 mb-1">${route.name}</h4>
                            <p class="text-sm text-gray-600 mb-2">${route.address}</p>
                            <div class="flex items-center mb-2">
                                <i class="fa fa-star text-yellow-400 mr-1"></i>
                                <span class="text-sm text-gray-600">${route.rating}</span>
                            </div>
                            <button onclick="viewRoute(${route.id})" class="text-primary hover:text-green-600 text-sm">
                                查看详情
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 更新收藏列表
        function updateFavoritesList() {
            const favorites = storage.getFavorites();
            const favoritesList = document.getElementById('favoritesList');
            
            if (favorites.length === 0) {
                favoritesList.innerHTML = '<p class="text-center text-gray-500">暂无收藏路线</p>';
                return;
            }
            
            const favoriteRoutes = locations.filter(route => favorites.includes(route.id));
            
            favoritesList.innerHTML = favoriteRoutes.map(route => `
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="flex">
                        <img src="${route.image}" alt="${route.name}" class="w-32 h-32 object-cover">
                        <div class="flex-1 p-4">
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="font-bold text-gray-800">${route.name}</h4>
                                <button onclick="toggleFavorite(${route.id})" class="text-red-500 hover:text-red-600">
                                    <i class="fa fa-heart"></i>
                                </button>
                            </div>
                            <p class="text-sm text-gray-600 mb-2">${route.address}</p>
                            <div class="flex items-center mb-2">
                                <i class="fa fa-star text-yellow-400 mr-1"></i>
                                <span class="text-sm text-gray-600">${route.rating}</span>
                            </div>
                            <button onclick="viewRoute(${route.id})" class="text-primary hover:text-green-600 text-sm">
                                查看详情
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 查看路线详情
        function viewRoute(routeId) {
            const route = locations.find(r => r.id === routeId);
            if (route) {
                displayRoute(route);
            }
        }

        // 一键生成路线
        document.getElementById('oneClickGenerate').addEventListener('click', function() {
            generateRoute();
        });

        // 生成路线按钮
        document.getElementById('generateRoute').addEventListener('click', function() {
            generateRoute();
        });

        // 初始化页面
        function init() {
            // 更新历史记录和收藏列表
            updateHistoryList();
            updateFavoritesList();
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
